# max 16 characters!
CONFIG_ZMK_KEYBOARD_NAME="Babbit36"

CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
# Fixes BLE disconnects on nRF52840 by disabling 2M PHY
# https://github.com/zmkfirmware/zmk/blob/main/docs/blog/2024-02-09-zephyr-3-5.md
# (CONFIG_ZMK_BLE_EXPERIMENTAL_CONN already enabled by EXPERIMENTAL_FEATURES)

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y
